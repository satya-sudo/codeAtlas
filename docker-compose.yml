services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: codeatlas-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: codeatlas-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://127.0.0.1:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
      - "29092:29092"

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: codeatlas-kafka-init
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:9092
    volumes:
      - ./scripts/dev/init-kafka-topics.sh:/init-kafka-topics.sh:ro
    entrypoint: ["/bin/sh", "/init-kafka-topics.sh"]
